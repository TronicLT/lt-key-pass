<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deterministic Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>KeyPass</h1>
            <p>Generate secure, deterministic passwords from a phrase and salt.</p>
        </header>

        <section class="generator-form">
            <div class="input-group">
                <label for="phrase">Key Phrase</label>
                <input type="password" id="phrase" placeholder="e.g. MySuperSecretPhrase" autocomplete="off" />
            </div>

            <div class="input-group">
                <label for="salt">Unique User Salt</label>
                <input type="text" id="salt" placeholder="e.g. github.com" autocomplete="off" />
            </div>

            <div class="settings-grid">
                <div class="input-group">
                    <label for="length">Length: <span id="length-val">16</span></label>
                    <input type="range" id="length" min="8" max="64" value="16" />
                </div>
            </div>

            <div class="checkbox-grid">
                <label class="checkbox-label">
                    <input type="checkbox" id="uppercase" checked />
                    <span class="custom-checkbox"></span>
                    Uppercase (A-Z)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="lowercase" checked />
                    <span class="custom-checkbox"></span>
                    Lowercase (a-z)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="numbers" checked />
                    <span class="custom-checkbox"></span>
                    Numbers (0-9)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="symbols" checked />
                    <span class="custom-checkbox"></span>
                    Symbols (!@#$)
                </label>
            </div>

            <div class="output-group">
                <input type="text" id="password-output" readonly placeholder="Your password will appear here" />
                <button id="copy-btn" title="Copy to Clipboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
            
            <div id="copy-feedback" class="feedback">Copied to clipboard!</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
